version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: aegis_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aegisai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aegis -d aegisai" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: aegis_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # AegisAI Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis_api
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aegis}:${POSTGRES_PASSWORD:-aegis_secret}@postgres:5432/${POSTGRES_DB:-aegisai}
      - REDIS_URL=redis://redis:6379/0
      - AEGIS_API_KEY=${AEGIS_API_KEY:-your-secret-key}
      - AEGIS_DEBUG=${AEGIS_DEBUG:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./frontend/dist:/app/frontend/dist:ro
    restart: unless-stopped

  # Frontend (Nginx serving Vite SPA build)
  # NOTE: Only needed if NOT using Firebase hosting.
  # For Firebase deployment, skip this service and run `npm run deploy` in frontend/
  frontend:
    image: nginx:alpine
    container_name: aegis_frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

